project: booko

defaults:
  image: git.booko.info/booko/booko:latest
  remote_dir: ~/booko-services
  network: host
  restart: on-failure
  environment:
    MALLOC_ARENA_MAX: "2"
    RUBY_YJIT_ENABLE: "1"
    BOOKO_LOG_STDOUT: "1"
  volumes:
    - ./log:/rails/log
  logging:
    max_size: 50m
    max_file: 5

hosts:
  grabber01:
    user: booko
  grabber02:
    user: booko

services:
  grabber:
    cmd: bundle exec bin/booko -W
    hosts: [grabber01, grabber02]
    replicas: 4

  active_job:
    cmd: bundle exec bin/active_job_worker
    hosts: [grabber02]

  scheduler:
    cmd: bundle exec ruby bin/scheduler
    hosts: [grabber02]

  amazon:
    cmd: bundle exec bin/amazon
    hosts: [grabber01, grabber02]
    environment:
      AMAZON_SPECIFIC: "true"
    volumes:
      - ./data:/data
